<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .card {
        background-color: rgb(218, 218, 218);
        padding-left: 0.8rem;
        border: 1px solid black;
      }
    </style>

    <script>
      const firstName = ["Maria", "Manuela", "Max", "Moritz", "Stephanie"];
      const surname = ["Berger", "Stuffer", "Muster", "Test", "Müller"];
      const age = [7, 8, 9, 10, 12];

      function add() {
        const randomFirstName =
          firstName[Math.floor(Math.random() * firstName.length)];

        const randomSurname =
          surname[Math.floor(Math.random() * surname.length)];

        const randomAge = age[Math.floor(Math.random() * age.length)];

        /* const student = {
          firstName: randomFirstName,
          surname: randomSurname,
          age: randomAge,
        };

        console.log(student); */

        const card = document.createElement("div");
        // card.classList.add("card");
        // card.id = Math.random();
        card.style.backgroundColor = "rgb(218, 218, 218)";
        card.style.paddingLeft = "0.8rem";
        card.style.border = "1px solid black";

        const firstNameParagraph = document.createElement("p");
        const surnameParagraph = document.createElement("p");
        const ageParagraph = document.createElement("p");

        const textFirstName = document.createTextNode(
          "Vorname: " + randomFirstName,
        );
        const textSurname = document.createTextNode(
          "Nachname: " + randomSurname,
        );
        const textAge = document.createTextNode("Alter: " + randomAge);

        firstNameParagraph.appendChild(textFirstName);
        surnameParagraph.appendChild(textSurname);
        ageParagraph.appendChild(textAge);

        card.appendChild(firstNameParagraph);
        card.appendChild(surnameParagraph);
        card.appendChild(ageParagraph);

        document.getElementById("wrapper").appendChild(card);
      }
    </script>
  </head>
  <body>
    <button onclick="add()">ADD</button>
    <div id="wrapper"></div>
  </body>
</html>
