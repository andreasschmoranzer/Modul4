<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      // 7: Event Listener
      document.addEventListener("DOMContentLoaded", loadNamesFromLocalstorage);

      // 1: Array erzeugen
      let names = [];

      // 6: Localstorage Item holen und in Array hinzufügen
      function loadNamesFromLocalstorage() {
        console.log(names);
        names = JSON.parse(localStorage.getItem("names"));
        console.log(names);
      }

      // 4: Localstorage Items setzen
      function saveNamesToLocalstorage() {
        console.log(JSON.stringify(names));
        localStorage.setItem("names", JSON.stringify(names));
      }

      // 5: Array und Localstorage zurücksetzen
      function deleteNames() {
        names = [];
        localStorage.removeItem("names");
      }

      /* let text = localStorage.getItem("testJSON");
      let obj = JSON.parse(text);
      document.getElementByID("demo").innerHTML = obj.name; */

      // 2: Namen hinzufügen zu Array
      function addName() {
        names.push(document.getElementById("addName").value);
        console.log(names);
      }

      // 3: namen aus Array löschen
      function deleteName() {
        console.log(names);
        const nameInput = document.getElementById("deleteName").value;
        names = names.filter((name) => {
          return name !== nameInput;
        });
        console.log(names);
      }
    </script>
  </head>
  <body>
    <input type="text" id="addName" /><button onclick="addName()">Add</button
    ><br />
    <input type="text" id="deleteName" /><button onclick="deleteName()">
      Delete</button
    ><br />
    <button>Load</button
    ><button onclick="saveNamesToLocalstorage()">Save</button
    ><button onclick="deleteNames()">Delete All</button>
  </body>
</html>
