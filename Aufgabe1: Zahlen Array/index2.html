<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let liste = ["Hallo", "Hi", "Test"];

      function add() {
        const value = document.getElementById("content").value;
        liste.push(value);
        printAll();
      }

      function deleteByPosition() {
        const position = Number(
          document.getElementById("deletePosition").value,
        );
        if (position < liste.length) {
          liste.splice(position, 1);
          printAll();
        } else {
          console.log(
            "Die Position muss kleiner als " + liste.length + " sein",
          );
        }
      }

      function deleteByContent() {
        const content = document.getElementById("deleteContent").value;
        const newListe = liste.filter((element) => {
          return element !== content;
        });
        liste = newListe;
        printAll();
      }

      function printAll() {
        console.log(liste);
        liste.forEach((element) => {
          console.log(element);
        });
      }

      function multiply() {
        const newListe = liste.map((element) => {
          return element + "Hallo";
        });
        liste = newListe;
        printAll();
      }

      function sum() {
        const sum = liste.reduce((previousValue, currentValue) => {
          return previousValue + " " + currentValue;
        });
        console.log(sum);
      }
    </script>
  </head>
  <body>
    Element einfügen: <input type="text" id="content" /><button onclick="add()">
      Einfügen</button
    ><br />

    Position löschen: <input type="number" id="deletePosition" /><button
      onclick="deleteByPosition()"
    >
      Löschen
    </button>

    Inhalt löschen: <input type="text" id="deleteContent" /><button
      onclick="deleteByContent()"
    >
      Löschen
    </button>

    <button onclick="printAll()">Anzeigen</button>
    <button onclick="multiply()">Multiplizieren</button>
    <button onclick="sum()">Summe</button>
  </body>
</html>
