<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zahlen Array</title>

    <script>
      let list = [5, 6];

      function showArray() {
        console.log(list);
        list.forEach((element) => {
          console.log(element);
        });
      }

      function multiplyArray() {
        mappedList = list.map((element) => {
          return element * 2;
        });
        list = mappedList;
        showArray();
      }

      function calculateArray() {
        const reducedValue = list.reduce((previousValue, currentValue) => {
          return previousValue + currentValue;
        });
        console.log(reducedValue);
      }

      function addElement() {
        const addElement = Number(document.getElementById("new-element").value);
        console.log(addElement);
        list.push(addElement);
        console.log(list);
      }

      function deleteByIndex() {
        const elementIndex = Number(
          document.getElementById("delete-index").value,
        );
        if (elementIndex < list.length) {
          list.splice(elementIndex, 1);
          console.log(list);
        } else {
          console.log("Die Position muss kleiner als " + list.length + " sein");
        }
      }

      function deleteElement() {
        const contentNumber = Number(
          document.getElementById("delete-element").value,
        );
        const newList = list.filter((element) => {
          return element !== contentNumber;
        });
        list = newList;
        console.log(list);
      }
    </script>
  </head>
  <body>
    <span>Inhalt einfügen:</span><span>&nbsp;</span
    ><input id="new-element" type="number" /><span>&nbsp;</span
    ><button onclick="addElement()">Einfügen</button><br />
    <span>ID Löschen:</span><input id="delete-index" type="number" /><span
      >&nbsp;</span
    ><button onclick="deleteByIndex()">Löschen</button><br />
    <span>Content Löschen: </span
    ><input id="delete-element" type="number" /><span>&nbsp;</span
    ><button onclick="deleteElement()">Löschen</button><br />
    <button onclick="showArray(list)">Anzeigen</button><br /><button
      onclick="multiplyArray()"
    >
      Multiplizieren</button
    ><br /><button onclick="calculateArray()">Summe</button>
  </body>
</html>
