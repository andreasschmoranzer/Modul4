<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zahlen Array</title>

    <script>
      const liste = [5, 6];
      let mappedListe = 0;

      function showArray(text) {
        console.log(text);
        text.forEach((element) => {
          console.log(element);
        });
      }

      function multiplyArray() {
        mappedListe = liste.map((element) => {
          return element * 2;
        });
        showArray(mappedListe);
        console.log(mappedListe);
      }

      function calculateArray() {
        const mappedListe = liste.map((element) => {
          return element * 2;
        });
        const reducedValue = mappedListe.reduce(
          (previousValue, currentValue) => {
            return previousValue + currentValue;
          },
        );
        console.log(reducedValue);
      }

      function contributeElement() {
        const addElement = Number(document.getElementById("newElement").value);
        console.log(addElement);
        if (mappedListe !== 0) {
          mappedListe.splice(2, 0, addElement);
          console.log(mappedListe);
        } else {
          liste.splice(2, 0, addElement);
          console.log(liste);
        }
      }

      function deleteID() {
        let elementIndex = Number(
          document.getElementById("delete-element").value,
        );
        console.log(elementIndex, mappedListe);
        if (mappedListe !== 0) {
          mappedListe.splice(elementIndex, 1);
          console.log(mappedListe);
        } else {
          liste.splice(elementIndex, 1);
          console.log(liste);
        }
      }

      function deleteContent() {
        const contentNumber = Number(
          document.getElementById("content-number").value,
        );
        if (mappedListe !== 0) {
          const numberIndex = mappedListe.findIndex((zahl) => {
            return zahl === contentNumber;
          });
          console.log(numberIndex);
          mappedListe.splice(numberIndex, 1);
          console.log(mappedListe);
        } else {
          const numberIndex = liste.findIndex((zahl) => {
            return zahl === contentNumber;
          });
          console.log(numberIndex);
          liste.splice(numberIndex, 1);
          console.log(liste);
        }
      }
    </script>
  </head>
  <body>
    <span>Inhalt einfügen:</span><span>&nbsp;</span
    ><input id="newElement" type="number" /><span>&nbsp;</span
    ><button onclick="contributeElement()">Einfügen</button><br />
    <span>ID Löschen:</span><input id="delete-element" type="number" /><span
      >&nbsp;</span
    ><button onclick="deleteID()">Löschen</button><br />
    <span>Content Löschen: </span
    ><input id="content-number" type="number" /><span>&nbsp;</span
    ><button onclick="deleteContent()">Löschen</button><br />
    <button onclick="showArray(liste)">Anzeigen</button><br /><button
      onclick="multiplyArray()"
    >
      Multiplizieren</button
    ><br /><button onclick="calculateArray()">Summe</button>
  </body>
</html>
