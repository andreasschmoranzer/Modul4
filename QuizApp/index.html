<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js"></script>
  </head>
  <body>
    <section class="quiz-container">
      <div class="quiz-content">
        <h1 class="quiz-title">Quiz</h1>
        <div id="display-question">
          <div class="question">
            <p class="question-title">
              Was ist die Hauptstadt von Deutschland?
            </p>
            <div class="answer-parent">
              <button class="answer-item btn">Hamburg</button
              ><button class="answer-item btn">München</button
              ><button class="answer-item btn">Berlin</button
              ><button class="answer-item btn">Hannover</button>
            </div>
          </div>
        </div>
        <div class="footer">
          <button class="btn">Lösung</button>
          <button class="btn">Weiter</button>
        </div>
      </div>
    </section>
  </body>
</html>
