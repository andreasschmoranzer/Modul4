<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      // 1: Array erstellen und mit Startwerten füllen
      const liste = [9, 2, 3, 4];
      // 2: Array auf der Konsole ausgeben
      console.log(liste);
      // 4: Array Wert hinzufügen
      liste.push(6);
      console.log(liste);
      // 5: Array Wert entfernen
      console.log(liste);
      /* liste.pop(); */
      console.log(liste.length);
      const letzteElement = liste.pop();
      console.log(letzteElement);
      console.log(liste);

      console.log(liste[3]);
      console.log(liste[liste.length - 1]);

      // 6: Array splicen (löschen und einfügen)
      liste.splice(1, 1);
      console.log(liste);

      liste.splice(1, 0, 8);
      console.log(liste);

      // 7: ForEach
      /* function ausgabe(element) {
        console.log(element);
      } */

      liste.forEach((element) => {
        console.log(element);
      });

      for (let i = 0; i <= liste.length - 1; i++) {
        console.log(liste[i]);
      }

      for (let element of liste) {
        console.log(element);
      }

      // 8: Filter
      const filteredListe = liste.filter((element) => {
        return false;
      });

      console.log(filteredListe);

      // 9: Map Erstellt ein neues Array mit den gewünschten Werten
      console.log(liste);
      const mappedListe = liste.map((element) => {
        return element * 2;
      });
      console.log(mappedListe);

      // 10: Reduce
      const reducedValue = liste.reduce((previousValue, currentValue) => {
        console.log(previousValue, currentValue);
        return previousValue + currentValue;
      });
      console.log(reducedValue);

      // Array Beispiel

      const array = ["Hallo", "Griasdi", "Servus"];
      console.log(array);

      array.push("Sers");
      console.log(array);
      const lastElement = array.pop();
      console.log(lastElement);
      console.log(array);

      array.splice(0, 0, "Pfiadi");
      console.log(array);

      const mappedArray = array.map((element) => {
        return element + "Vällkommen";
      });
      console.log(mappedArray);

      const reduceArray = array.reduce((previousValue, currentValue) => {
        console.log(previousValue, currentValue);
        return previousValue + currentValue;
      });

      console.log(reduceArray);
    </script>
  </head>
  <body></body>
</html>
