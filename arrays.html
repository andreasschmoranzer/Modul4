<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      // 1: Array erstellen und mit Startwerten füllen
      const liste = [9, 2, 3, 4];
      // 2: Array auf der Konsole ausgeben
      console.log(liste);
      // 4: Array Wert hinzufügen
      liste.push(6);
      console.log(liste);
      // 5: Array Wert entfernen
      console.log(liste);
      /* liste.pop(); */
      console.log(liste.length);
      const letzteElement = liste.pop();
      console.log(letzteElement);
      console.log(liste);

      console.log(liste[3]);
      console.log(liste[liste.length - 1]);

      // 6: Array splicen (löschen und einfügen)
      liste.splice(1, 1);
      console.log(liste);

      liste.splice(1, 0, 8);
      console.log(liste);
    </script>
  </head>
  <body></body>
</html>
